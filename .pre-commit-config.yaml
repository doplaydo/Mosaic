repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-symlinks
      - id: debug-statements
      - id: mixed-line-ending
      - id: name-tests-test
        args: ['--pytest-test-first']
      - id: trailing-whitespace
        args: ['--markdown-linebreak-ext=md']

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.0
    hooks:
      - id: ruff-format
        types_or: [python, jupyter, pyi]
      - id: ruff-check
        types_or: [python, pyi]
        args: ['--fix']

  - repo: local
    hooks:
      - id: clj-kondo
        name: clj-kondo
        entry: bash -c 'command -v clj-kondo >/dev/null 2>&1 && clj-kondo --lint src --fail-level error || echo "clj-kondo not installed, skipping"'
        language: system
        files: ^src/.*\.(clj|cljs|cljc)$
        pass_filenames: false
